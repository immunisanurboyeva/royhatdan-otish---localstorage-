<!-- Modalni ochish tugmasi -->
<button id="openModal">Modalni ochish</button>

<!-- Modal oyna (dastlab yashirin) -->
<div id="myModal" class="modal">
  <div class="modal-content">
    <span class="close">&times;</span>
    <p>Bu modal oyna mazmuni!</p>
  </div>
</div>

<style>
  /* Modal fon va yashirish */
  .modal {
    display: none;
    position: fixed;
    top: 0; left: 0; width: 100%; height: 100%;
    background-color: rgba(0,0,0,0.5);
  }
  /* Modal oyna qismi */
  .modal-content {
    background-color: white;
    margin: 15% auto;
    padding: 20px;
    width: 50%;
  }
  /* Yopish tugmasi */
  .close { float: right; cursor: pointer; }
</style>

<script>
  // Elementlarni olish
  const modal = document.getElementById("myModal");
  const btn = document.getElementById("openModal");
  const span = document.getElementsByClassName("close")[0];

  // Tugma bosilganda modalni ochish
  btn.onclick = function() { modal.style.display = "block"; }

  // (x) bosilganda yopish
  span.onclick = function() { modal.style.display = "none"; }

  // Modal tashqarisi bosilganda yopish
  window.onclick = function(event) {
    if (event.target == modal) { modal.style.display = "none"; }
  }
</script>
